# ── MemPalace MCP Server — Databricks App Config ──────────────────────────────
#
# Deploy (code already in workspace — no sync needed):
#
#   databricks apps create mcp-mempalace --profile dev
#   databricks apps deploy mcp-mempalace \
#       --source-code-path "/Workspace/Users/$DB_USER/mempalace-databricks" \
#       --profile dev
#
# The app name MUST start with "mcp-" for AI Playground discoverability.

command:
  - "uvicorn"
  - "app.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: MEMPALACE_CATALOG
    value: "scratch"
  - name: MEMPALACE_SCHEMA
    value: "mitch_grabner"
  - name: MEMPALACE_WAREHOUSE_ID
    valueFrom: mempalace-sql-warehouse

resources:
  - name: mempalace-sql-warehouse
    sql_warehouse:
      permission: CAN_USE
